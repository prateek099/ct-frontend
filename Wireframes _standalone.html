  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Kalam';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"b7632163-ba59-4cc7-b4e1-6edba6ddfb7a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --paper:#faf7f2;\n    --paper-2:#f2ede3;\n    --ink:#1a1a1a;\n    --ink-2:#3a3a3a;\n    --ink-3:#7a7468;\n    --rule:#1a1a1a;\n    --accent:oklch(0.55 0.15 250);\n    --accent-soft:oklch(0.90 0.05 250);\n    --warn:oklch(0.72 0.14 60);\n    --sketchiness:1;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Kalam',sans-serif}\n  body{\n    background-image:\n      radial-gradient(circle at 20% 10%, rgba(0,0,0,0.015) 1px, transparent 1.5px),\n      radial-gradient(circle at 80% 60%, rgba(0,0,0,0.02) 1px, transparent 1.5px),\n      linear-gradient(var(--paper),var(--paper));\n    background-size: 180px 180px, 220px 220px, 100% 100%;\n  }\n  .hand{font-family:'Caveat',cursive}\n  .anno{font-family:'Architects Daughter',cursive}\n  .mono{font-family:ui-monospace,Menlo,monospace}\n\n  header.top{\n    padding:28px 40px 12px;\n    border-bottom:1.5px dashed var(--ink);\n    position:sticky;top:0;background:var(--paper);z-index:20;\n  }\n  header.top h1{font-family:'Caveat';font-weight:700;font-size:48px;margin:0;letter-spacing:0.5px}\n  header.top .sub{font-family:'Architects Daughter';color:var(--ink-3);font-size:14px;margin-top:2px}\n  header.top .meta{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap}\n  .tabs{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}\n  .tab{\n    font-family:'Caveat';font-size:22px;font-weight:600;\n    padding:6px 18px 8px;border:1.5px solid var(--ink);border-bottom:none;\n    background:var(--paper-2);cursor:pointer;\n    border-radius:18px 22px 2px 2px / 24px 18px 2px 2px;\n    transform:rotate(var(--r,-0.4deg));\n    position:relative;top:2px;\n  }\n  .tab:nth-child(2){--r:0.3deg}\n  .tab:nth-child(3){--r:-0.6deg}\n  .tab.active{background:var(--paper);color:var(--ink);top:0;border-bottom:2px solid var(--paper);z-index:2;box-shadow:0 -2px 0 var(--ink)}\n  .tab .num{color:var(--accent);font-family:'Architects Daughter';font-size:13px;margin-right:6px;vertical-align:3px}\n\n  /* Storyboard */\n  .reel{\n    overflow-x:auto; overflow-y:hidden;\n    padding:28px 40px 60px;\n    scroll-snap-type:x proximity;\n  }\n  .reel-inner{display:flex;gap:0;align-items:flex-start;min-width:min-content}\n  .frame{\n    flex:0 0 auto;\n    width:460px; min-height:560px;\n    background:var(--paper);\n    border:1.8px solid var(--ink);\n    border-radius:14px 12px 16px 10px / 12px 14px 10px 16px;\n    padding:14px 16px 18px;\n    position:relative;\n    scroll-snap-align:start;\n    box-shadow: 2px 3px 0 var(--ink);\n    transform:rotate(calc(var(--rot,0deg) * var(--sketchiness)));\n  }\n  .frame.wide{width:560px}\n  .frame.tall{min-height:640px}\n  .frame-head{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1.2px dashed var(--ink);padding-bottom:6px;margin-bottom:10px}\n  .frame-head .no{font-family:'Architects Daughter';font-size:12px;color:var(--ink-3);letter-spacing:1px}\n  .frame-head .ttl{font-family:'Caveat';font-weight:700;font-size:26px;line-height:1}\n  .arrow{\n    flex:0 0 auto;\n    width:64px; height:560px;\n    display:flex;align-items:center;justify-content:center;\n    color:var(--ink);\n  }\n  .arrow svg{width:60px;height:48px}\n\n  /* Generic sketchy UI primitives */\n  .box{border:1.5px solid var(--ink);border-radius:6px 8px 5px 9px / 8px 5px 9px 6px;padding:8px 10px;background:var(--paper)}\n  .box.filled{background:var(--paper-2)}\n  .box.accent{border-color:var(--accent);background:color-mix(in oklch, var(--accent) 8%, var(--paper))}\n  .pill{display:inline-block;border:1.3px solid var(--ink);border-radius:999px;padding:2px 10px;font-family:'Caveat';font-size:16px;background:var(--paper)}\n  .pill.accent{border-color:var(--accent);color:var(--accent)}\n  .pill.filled{background:var(--ink);color:var(--paper)}\n  .row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}\n  .col{display:flex;flex-direction:column;gap:6px}\n  .line{height:1.4px;background:var(--ink);opacity:0.8;border-radius:2px}\n  .line.w30{width:30%} .line.w40{width:40%} .line.w50{width:50%} .line.w60{width:60%} .line.w70{width:70%} .line.w80{width:80%} .line.w90{width:90%} .line.w100{width:100%}\n  .scribble{height:8px;background:repeating-linear-gradient(135deg,var(--ink),var(--ink) 1.2px,transparent 1.2px,transparent 4px);opacity:0.7;border-radius:2px}\n  .img-ph{\n    border:1.4px solid var(--ink);border-radius:4px;\n    background:\n      linear-gradient(var(--ink),var(--ink)) 0 0/100% 1.4px no-repeat,\n      linear-gradient(var(--ink),var(--ink)) 0 100%/100% 1.4px no-repeat,\n      repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(0,0,0,0.08) 6px,rgba(0,0,0,0.08) 7px);\n    display:flex;align-items:center;justify-content:center;\n    font-family:'Architects Daughter';font-size:11px;color:var(--ink-3);\n    min-height:60px;\n  }\n  .btn{\n    display:inline-block;border:1.5px solid var(--ink);\n    font-family:'Caveat';font-weight:600;font-size:18px;\n    padding:4px 14px 6px;background:var(--paper);\n    border-radius:24px 22px 26px 20px / 22px 26px 20px 24px;\n    box-shadow:1.5px 2px 0 var(--ink);\n    cursor:default;\n  }\n  .btn.primary{background:var(--ink);color:var(--paper)}\n  .btn.accent{background:var(--accent);color:white;border-color:var(--accent);box-shadow:1.5px 2px 0 var(--ink)}\n  .btn.sm{font-size:15px;padding:2px 10px 3px}\n  .chk{width:12px;height:12px;border:1.4px solid var(--ink);border-radius:3px;display:inline-block;vertical-align:-1px}\n  .chk.on{background:var(--ink)}\n  .tag{font-family:'Architects Daughter';font-size:11px;color:var(--ink-3);letter-spacing:0.5px;text-transform:uppercase}\n\n  /* Annotations */\n  .note{\n    position:absolute;font-family:'Architects Daughter';font-size:12.5px;color:var(--ink);\n    background:color-mix(in oklch, var(--accent-soft) 55%, var(--paper));\n    border:1.2px dashed var(--accent);\n    padding:4px 8px;border-radius:4px;max-width:180px;line-height:1.25;\n    z-index:5;transform:rotate(var(--r,-1deg));\n    box-shadow:1px 1px 0 rgba(0,0,0,0.08);\n  }\n  .note::before{\n    content:'';position:absolute;border-top:1.2px dashed var(--accent);\n    width:var(--len,40px);left:var(--nx,-40px);top:var(--ny,50%);\n    transform:rotate(var(--nr,-15deg));transform-origin:right center;\n  }\n  .hide-notes .note{display:none}\n\n  /* Direction header / intro card */\n  .intro{\n    flex:0 0 auto;width:320px;min-height:560px;\n    padding:20px 18px;margin-right:18px;\n    background:var(--paper-2);\n    border:2px solid var(--ink);border-radius:8px;\n    box-shadow:3px 4px 0 var(--ink);\n    display:flex;flex-direction:column;gap:12px;\n    transform:rotate(calc(-0.5deg * var(--sketchiness)));\n  }\n  .intro .kicker{font-family:'Architects Daughter';font-size:12px;letter-spacing:2px;color:var(--accent);text-transform:uppercase}\n  .intro h2{font-family:'Caveat';font-size:42px;font-weight:700;margin:0;line-height:0.95}\n  .intro p{font-family:'Kalam';font-size:14px;line-height:1.45;margin:0;color:var(--ink-2)}\n  .intro ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:4px}\n  .intro li{font-family:'Kalam';font-size:13px;padding-left:18px;position:relative}\n  .intro li::before{content:'→';position:absolute;left:0;color:var(--accent);font-family:'Caveat';font-weight:700}\n  .intro .tools{margin-top:auto;font-family:'Architects Daughter';font-size:11px;color:var(--ink-3);line-height:1.5}\n\n  /* Tool index card */\n  .tool-legend{\n    display:grid;grid-template-columns:repeat(3,1fr);gap:4px 14px;\n    font-family:'Kalam';font-size:12px;\n  }\n  .tool-legend span{display:flex;gap:6px}\n  .tool-legend b{color:var(--accent);font-family:'Architects Daughter';min-width:18px}\n\n  /* Tweaks */\n  #tweaks{\n    position:fixed;bottom:18px;right:18px;z-index:50;\n    background:var(--paper);border:1.5px solid var(--ink);\n    border-radius:10px;box-shadow:3px 4px 0 var(--ink);\n    padding:12px 14px;font-family:'Kalam';font-size:13px;\n    display:none;min-width:220px;\n  }\n  #tweaks.open{display:block}\n  #tweaks h4{margin:0 0 8px;font-family:'Caveat';font-size:22px;font-weight:700}\n  #tweaks label{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:6px 0}\n  #tweaks input[type=range]{width:100px}\n  #tweaks select, #tweaks button{font-family:'Kalam';font-size:12px;padding:2px 6px;border:1px solid var(--ink);background:var(--paper)}\n\n  /* Mini helpers */\n  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}\n  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}\n  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}\n  .spacer{height:6px}\n  .bar{height:10px;background:var(--ink);opacity:0.2;border-radius:2px;position:relative}\n  .bar > i{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:2px;display:block}\n  .tool-tag{font-family:'Architects Daughter';font-size:10.5px;color:var(--accent);border:1px dashed var(--accent);border-radius:3px;padding:0 5px}\n\n  /* Sidebar mock */\n  .sidebar{border:1.4px solid var(--ink);border-radius:6px;padding:8px;display:flex;flex-direction:column;gap:4px;background:var(--paper)}\n  .side-item{font-family:'Kalam';font-size:13px;padding:2px 6px;border-radius:3px;display:flex;gap:6px;align-items:center}\n  .side-item.active nloaders (T17/T18) surface as secondary utilities in all three directions.\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Tweaks panel -->\n<div id=\"tweaks\">\n  <h4>Tweaks<\u002Fh4>\n  <label>Sketchiness <input type=\"range\" min=\"0\" max=\"2\" step=\"0.1\" value=\"1\" id=\"t-sketch\"><\u002Flabel>\n  <label>Annotations <input type=\"checkbox\" checked=\"\" id=\"t-notes\"><\u002Flabel>\n  <label>Accent\n    <select id=\"t-accent\">\n      <option value=\"oklch(0.55 0.15 250)\">cobalt<\u002Foption>\n      <option value=\"oklch(0.60 0.17 30)\">rust<\u002Foption>\n      <option value=\"oklch(0.62 0.14 145)\">moss<\u002Foption>\n      <option value=\"oklch(0.62 0.16 330)\">magenta<\u002Foption>\n      <option value=\"oklch(0.55 0 0)\">mono (no accent)<\u002Foption>\n    <\u002Fselect>\n  <\u002Flabel>\n  <label>Paper\n    <select id=\"t-paper\">\n      <option value=\"warm\">warm (off-white)<\u002Foption>\n      <option value=\"cool\">cool (blue-grey)<\u002Foption>\n      <option value=\"plain\">plain white<\u002Foption>\n      <option value=\"grid\">graph paper<\u002Foption>\n    <\u002Fselect>\n  <\u002Flabel>\n<\u002Fdiv>\n\n<script>\n// --- Tabs -------------------------------------------------------------------\nconst tabs = document.querySelectorAll('.tab');\nconst sections = document.querySelectorAll('.direction');\ntabs.forEach(t => t.addEventListener('click', () => {\n  tabs.forEach(x => x.classList.remove('active'));\n  t.classList.add('active');\n  const d = t.dataset.dir;\n  sections.forEach(s => s.classList.toggle('active', s.dataset.dir === d));\n  try { localStorage.setItem('cos_dir', d); } catch(e){}\n}));\ntry {\n  const saved = localStorage.getItem('cos_dir');\n  if (saved) {\n    tabs.forEach(t => t.classList.toggle('active', t.dataset.dir === saved));\n    sections.forEach(s => s.classList.toggle('active', s.dataset.dir === saved));\n  }\n} catch(e){}\n\n// --- Tweaks host protocol ---------------------------------------------------\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"sketchiness\": 1,\n  \"annotations\": true,\n  \"accent\": \"oklch(0.55 0.15 250)\",\n  \"paper\": \"warm\"\n}/*EDITMODE-END*/;\n\nconst state = { ...TWEAK_DEFAULTS };\nconst panel = document.getElementById('tweaks');\nconst $sketch = document.getElementById('t-sketch');\nconst $notes  = document.getElementById('t-notes');\nconst $accent = document.getElementById('t-accent');\nconst $paper  = document.getElementById('t-paper');\n\nfunction applyState(){\n  document.documentElement.style.setProperty('--sketchiness', state.sketchiness);\n  document.body.classList.toggle('hide-notes', !state.annotations);\n  document.documentElement.style.setProperty('--accent', state.accent);\n  // paper\n  const paperMap = {\n    warm: { paper:'#faf7f2', paper2:'#f2ede3' },\n    cool: { paper:'#f4f6fa', paper2:'#e8ecf2' },\n    plain:{ paper:'#ffffff', paper2:'#f3f3f3' },\n    grid: { paper:'#fafafa', paper2:'#f0f0f0' },\n  };\n  const p = paperMap[state.paper] || paperMap.warm;\n  document.documentElement.style.setProperty('--paper', p.paper);\n  document.documentElement.style.setProperty('--paper-2', p.paper2);\n  if (state.paper === 'grid') {\n    document.body.style.backgroundImage =\n      'linear-gradient(to right, rgba(0,0,0,0.04) 1px, transparent 1px),' +\n      'linear-gradient(to bottom, rgba(0,0,0,0.04) 1px, transparent 1px)';\n    document.body.style.backgroundSize = '18px 18px, 18px 18px';\n  } else {\n    document.body.style.backgroundImage = '';\n    document.body.style.backgroundSize = '';\n  }\n}\nfunction syncInputs(){\n  $sketch.value = state.sketchiness;\n  $notes.checked = !!state.annotations;\n  $accent.value = state.accent;\n  $paper.value  = state.paper;\n}\nsyncInputs(); applyState();\n\nfunction persist(){\n  try {\n    window.parent.postMessage({type:'__edit_mode_set_keys', edits: state }, '*');\n  } catch(e){}\n}\n$sketch.addEventListener('input', () => { state.sketchiness = parseFloat($sketch.value); applyState(); persist(); });\n$notes.addEventListener('change', () => { state.annotations = $notes.checked; applyState(); persist(); });\n$accent.addEventListener('change', () => { state.accent = $accent.value; applyState(); persist(); });\n$paper.addEventListener('change', () => { state.paper = $paper.value; applyState(); persist(); });\n\nwindow.addEventListener('message', (e) => {\n  if (!e.data) return;\n  if (e.data.type === '__activate_edit_mode') panel.classList.add('open');\n  else if (e.data.type === '__deactivate_edit_mode') panel.classList.remove('open');\n});\nwindow.parent.postMessage({type:'__edit_mode_available'}, '*');\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
