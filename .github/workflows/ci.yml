name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests (vitest)
        # Prateek: --passWithNoTests is fine until we land Vitest specs in
        # the Phase 8 test-infrastructure work. Don't gate CI on lint yet —
        # pre-existing react-hooks errors in ChannelStats need a separate
        # cleanup PR before that's safe to enable.
        run: npm run test:ci
