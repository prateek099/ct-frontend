server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Defence-in-depth security headers. Render terminates TLS upstream so
    # the client receives these over HTTPS; HSTS therefore applies as
    # intended even though nginx itself listens on plain :80 inside the
    # container. `always` ensures the headers are emitted on non-2xx
    # responses too (e.g. 404 from try_files miss).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── API proxy — keeps the BE same-origin from the browser's POV ────────────
    # onrender.com is on the Public Suffix List, so the FE and BE subdomains
    # would otherwise be treated as separate sites and the auth cookie would
    # be third-party (blocked by Safari, Brave, soon Chrome). Proxying /api/
    # through nginx makes API calls same-origin → cookies are first-party.
    #
    # The backend host is hardcoded; update + redeploy if Render reassigns
    # the BE service URL.
    location /api/ {
        proxy_pass https://ct-backend-c0tm.onrender.com;
        proxy_ssl_server_name on;
        proxy_set_header Host ct-backend-c0tm.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # AI generation can take 30s+; default nginx timeout (60s) is usually
        # fine, but be explicit so streaming responses don't get cut.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # React Router — serve index.html for all non-API routes
    location / {
        try_files $uri $uri/ /index.html;
    }

}
