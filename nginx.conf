server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Defence-in-depth security headers. Render terminates TLS upstream so
    # the client receives these over HTTPS; HSTS therefore applies as
    # intended even though nginx itself listens on plain :80 inside the
    # container. `always` ensures the headers are emitted on non-2xx
    # responses too (e.g. 404 from try_files miss).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # React Router — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

}
